            color: white;
            overflow: hidden;
        }

        .dashboard { display: flex; gap: 30px; align-items: center; }

        /* CARRÉ CENTRAL FIXE */
        #affichage-central {
            width: 450px;
            height: 450px;
            background: rgba(15, 0, 30, 0.85); /* Fond sombre transparent */
            border: 2px solid #bc13fe;
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.5);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Le contenu commence en haut */
            box-sizing: border-box;
        }

        /* TITRE TOUJOURS À LA MÊME HAUTEUR */
        #titre {
            height: 60px; /* Hauteur fixe pour le titre */
            margin: 0 0 20px 0;
            color: #bc13fe;
            font-size: 2.2rem;
            text-transform: uppercase;
            text-shadow: 0 0 10px #bc13fe;
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
        }

        #description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 10px;
        }

        /* MENU À DROITE */
        .menu-onglets { display: flex; flex-direction: column; gap: 15px; }

        .onglet {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #bc13fe;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
            font-weight: bold;
            text-align: center;
        }

        .onglet:hover { 
            background: #bc13fe; 
            color: black; 
            transform: scale(1.05);
        }

        .active { 
            background: #bc13fe; 
            box-shadow: 0 0 15px #bc13fe;
            color: black;
        }

        /* STYLE POUR LES BOUTONS DE RÉSEAUX */
        .social-link {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 80%;
            background: #222;
            border: 1px solid #bc13fe;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .social-link:hover { background: #bc13fe; color: black; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- CARRÉ CENTRAL -->
    <div id="affichage-central">
        <h2 id="titre">ABOUT ME</h2>
        <div id="description">
            <p>༄․ೃ࿔ ✧ Louna ✧ ࿐ <br> Coucou, moi c’est Louna <br> Je stream surtout pour chill, jouer et parler avec vous. J’aime les ambiances cosy, les moments random et juste passer du bon temps <br> Si t’as envie de te poser et discuter tranquille, t’es au bon endroit 💜 </p>
        </div>
    </div>

    <!-- ONGLETS -->
    <div class="menu-onglets">
        <div id="btn-1" class="onglet active" onclick="changerContenu('ABOUT ME', ' <p>༄․ೃ࿔ ✧ Louna ✧ ࿐ <br> Coucou, moi c’est Louna <br> Je stream surtout pour chill, jouer et parler avec vous. J’aime les ambiances cosy, les moments random et juste passer du bon temps <br> Si t’as envie de te poser et discuter tranquille, t’es au bon endroit 💜 </p>', this)">👤 About Me</div>
        <div id="btn-2" class="onglet" onclick="changerReseaux(this)">🔗 Links</div>
    </div>
</div>

<script>
    // Fonction pour le texte classique
    function changerContenu(titre, texte, element) {
        document.getElementById('titre').innerHTML = titre;
        document.getElementById('description').innerHTML = `<p>${texte}</p>`;
        majStyle(element);
    }

    // Fonction spéciale pour afficher les boutons de réseaux sociaux
    function changerReseaux(element) {
        document.getElementById('titre').innerHTML = "LINKS";
        document.getElementById('description').innerHTML = `
            <a href="https://www.tiktok.com/@haori.hm?is_from_webapp=1&sender_device=pc" target="_blank" class="social-link">🎵 TikTok</a>
            <a href="https://www.twitch.tv/lounala_62" target="_blank" class="social-link">💜 Twitch</a>
            <a href="https://www.youtube.com/@Lounala_62" target="_blank" class="social-link">🎬 YouTube</a>
        `;
        majStyle(element);
    }

    // Gérer l'apparence des onglets
    function majStyle(element) {
        document.querySelectorAll('.onglet').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
    }
</script>

</body>
</html>
